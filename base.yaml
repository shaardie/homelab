---

- hosts: all
  become: true
  vars_files:
    - secret-vars.yml
  tasks:
    - name: install base tools
      ansible.builtin.apt:
        update_cache: true
        state: present
        name:
          - acl
          - sudo
          - vim
          - htop
          - iotop
          - nload
          - curl
          - tcpdump
          - unattended-upgrades

    - name: install prometheus node exporter
      ansible.builtin.apt:
        update_cache: true
        state: present
        name:
          - prometheus-node-exporter
      when: skip_node_exporter is not defined

    - name: install certbot
      ansible.builtin.apt:
        update_cache: true
        state: present
        name:
          - python3-certbot
          - python3-certbot-dns-cloudflare
      when: certificates is defined

    - name: ensure cloudflare config
      copy:
        dest: /etc/cloudflare.ini
        mode: 0600
        content: 'dns_cloudflare_api_token = {{ cloudflare_token }}'
        force: true
      when: certificates is defined

    - name: create certificate
      ansible.builtin.command: certbot certonly
        --agree-tos
        --domain {{ item }}
        --dns-cloudflare
        --dns-cloudflare-credentials /etc/cloudflare.ini
        -m sven@haardiek.de
      args:
        creates: /etc/letsencrypt/live/{{ item }}/cert.pem
      loop: '{{ certificates | default([]) }}'

    - name: create admin users
      user:
        name: sven
        groups: sudo
        append: true
        shell: /bin/bash

    - name: set up admin authorized keys
      authorized_key:
        user: sven
        state: present
        key: |
            ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBBD1gmiqQECFn1xtqTZMP7/bazZWKKzvGrnl0OrH9vh sven@pacman
            ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGv5oKBbk1eHLot+4ooNXViv8IHekN5DprpJWs7ipVvH sven@porter
    - name: allow to sudo without a password
      copy:
        dest: /etc/sudoers.d/password-less-sudo
        mode: 0600
        content: '%sudo ALL=(ALL) NOPASSWD: ALL'
        force: true

    - name: ensure unattended-upgrades config
      copy:
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        mode: 0644
        content: |
            Unattended-Upgrade::Origins-Pattern {
                "origin=Debian,codename=${distro_codename},label=Debian";
                "origin=Debian,codename=${distro_codename},label=Debian-Security";
                "origin=Debian,codename=${distro_codename}-security,label=Debian-Security";
            };
            Unattended-Upgrade::Package-Blacklist {
            };
            Unattended-Upgrade::Automatic-Reboot "true";
